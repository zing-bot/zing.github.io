<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行足迹 - WanderLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --mango-orange: #FF9933;
            --coral-pink: #FF6B6B;
            --mint-green: #88D8B0;
            --cream-white: #FFF8F0;
            --glass-white: rgba(255, 255, 255, 0.75);
            --text-dark: #2D3436;
            --text-light: #636E72;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 50%, #FFEEE8 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            margin: 20px auto;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--mango-orange);
        }

        .logo i {
            font-size: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: var(--mango-orange);
            color: white;
        }

        .welcome-section {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px 50px;
            margin: 15px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            gap: 40px;
        }

        .welcome-text h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--mango-orange), var(--coral-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .welcome-text p {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .stats-grid {
            display: flex;
            gap: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--mango-orange), var(--coral-pink));
            padding: 25px 35px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card:nth-child(2) {
            background: linear-gradient(135deg, var(--coral-pink), #FF8E8E);
        }

        .stat-card:nth-child(3) {
            background: linear-gradient(135deg, var(--mint-green), #A8E6CF);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 500;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 10px 0 15px;
        }

        .section-title i {
            color: var(--mango-orange);
        }

        .map-container {
            background: white;
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 5px;
        }

        #map {
            height: 300px;
            border-radius: 16px;
            z-index: 1;
        }

        .filter-bar {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 30px;
            margin: 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 22px;
            border: 2px solid var(--mango-orange);
            background: transparent;
            color: var(--mango-orange);
            border-radius: 25px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--mango-orange);
            color: white;
        }

        .result-count {
            font-weight: 600;
            color: var(--text-light);
        }

        .result-count span {
            color: var(--coral-pink);
            font-weight: 700;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 10px 0;
        }

        .friends-section {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin: 10px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .friends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }

        .friend-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .friend-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.15);
        }

        .friend-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 15px;
            border: 3px solid var(--mango-orange);
            position: relative;
        }

        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .friend-card h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .friend-card p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .friend-location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--mango-orange);
            font-weight: 600;
        }

        .friend-tag {
            background: linear-gradient(135deg, var(--mint-green), #A8E6CF);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            display: inline-block;
            cursor: pointer;
        }

        .friend-tag:hover {
            background: linear-gradient(135deg, var(--mango-orange), var(--coral-pink));
            transition: all 0.3s ease;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            font-size: 0.8rem;
        }

        .friend-avatar:hover .edit-avatar-btn {
            opacity: 1;
        }

        .edit-avatar-btn:hover {
            background: var(--mango-orange);
            transform: scale(1.1);
        }

        .travel-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .travel-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 50px rgba(255, 107, 107, 0.2);
        }

        .card-image {
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .travel-card:hover .card-image img {
            transform: scale(1.1);
        }

        .card-content {
            padding: 22px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .location-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .country-tag {
            display: inline-block;
            background: linear-gradient(135deg, var(--mint-green), #A8E6CF);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 6px;
        }

        .like-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #DDD;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px;
        }

        .like-btn:hover {
            transform: scale(1.2);
        }

        .like-btn.liked {
            color: var(--coral-pink);
        }

        .card-date {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .card-date i {
            color: var(--mango-orange);
        }

        .card-description {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-conditions {
            display: flex;
            gap: 15px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .card-tag {
            background: linear-gradient(135deg, var(--mango-orange), var(--coral-pink));
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .card-continent {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .weather,
        .mood {
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .weather {
            background: linear-gradient(135deg, #4ECDC4, #45B7D1);
            color: white;
        }

        .mood {
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
        }

        .weather:hover,
        .mood:hover {
            transform: scale(1.05);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .edit-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--mango-orange);
            cursor: pointer;
            padding: 5px;
            transition: all 0.3s ease;
        }

        .edit-btn:hover {
            transform: scale(1.1);
        }

        .edit-image-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .card-image:hover .edit-image-btn {
            opacity: 1;
        }

        .edit-image-btn:hover {
            background: var(--mango-orange);
            transform: scale(1.1);
        }

        .edit-input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid var(--mango-orange);
            border-radius: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
        }

        .edit-select {
            padding: 8px 12px;
            border: 2px solid var(--mango-orange);
            border-radius: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            background: white;
        }

        .edit-field {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .edit-field:hover {
            background: rgba(255, 153, 51, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .travel-card.editing {
            border: 2px solid var(--mango-orange);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-weight: 500;
        }

        footer a {
            color: var(--mango-orange);
            text-decoration: none;
        }

        .custom-marker {
            background: var(--mango-orange);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .welcome-section {
                flex-direction: column;
                text-align: center;
                padding: 35px 25px;
            }

            .stats-grid {
                flex-wrap: wrap;
                justify-content: center;
            }

            .welcome-text h1 {
                font-size: 2rem;
            }

            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .filter-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .filter-buttons {
                justify-content: center;
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                flex-direction: column;
            }

            .stat-card {
                padding: 20px 30px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 按钮样式 */
        .add-friend-btn {
            background: linear-gradient(135deg, var(--mango-orange), var(--coral-pink));
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-family: 'Quicksand', 'Comic Sans MS', cursive, sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px auto 0;
        }

        .add-friend-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 153, 51, 0.3);
        }

        .add-city-btn {
            background: linear-gradient(135deg, var(--mango-orange), var(--coral-pink));
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-family: 'Quicksand', 'Comic Sans MS', cursive, sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 20px auto;
        }

        .add-city-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 153, 51, 0.3);
        }

        /* 空白状态样式 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--mango-orange);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        .empty-state p {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-globe"></i>
                <span>WanderLog</span>
            </div>
            <div class="nav-links">
                <a href="#map" class="active">足迹</a>
                <a href="#cards">城市</a>
                <a href="#friends">朋友互动</a>
            </div>
        </nav>

        <section class="welcome-section">
            <div class="welcome-text">
                <h1>旅游日记</h1>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-number" id="city-count">0</span>
                    <span class="stat-label">旅行城市</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="trip-count">0</span>
                    <span class="stat-label">旅游足迹</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="friend-count">0</span>
                    <span class="stat-label">朋友足迹</span>

            </div>
        </section>

        <h2 class="section-title" id="map">
            <i class="fas fa-map-marked-alt"></i>
            我的足迹地图
        </h2>
        <div class="map-container">
            <div id="map"></div>
        </div>

        <h2 class="section-title">
            <i class="fas fa-map-marked-alt"></i>
            我的城市足迹
        </h2>
        <button id="add-city-btn" class="add-city-btn">
            <i class="fas fa-plus"></i>
            添加城市
        </button>
        <div class="cards-grid" id="cards-container"></div>

        <h2 class="section-title" id="friends">
            <i class="fas fa-users"></i>
            朋友足迹
        </h2>
        <div class="friends-section">
            <div class="cards-grid" id="friends-container"></div>
            <button id="add-friend-btn" class="add-friend-btn">
                <i class="fas fa-plus"></i>
                添加朋友
            </button>
        </div>

        <footer id="about">
            <p>© 2026 WanderLog | 用脚步丈量世界，用心感受生活</p>
        </footer>
    </div>

            {

                city: "洛杉矶",

                continent: "美洲",
                date: "2014.06",
                description: "好莱坞的星光大道，比佛利山庄的奢华，圣莫尼卡的海滩。",

                coordinates: [34.0522, -118.2437]
            },
            {
                id: 13,
                city: "华盛顿",
                country: "美国",
                continent: "美洲",
                date: "2014.06",
                description: "国会大厦的庄严，林肯纪念堂的肃穆， Smithsonian博物馆的丰富。",
                image: "https://images.unsplash.com/photo-1555109307-f7d9da25c244?w=600&h=400&fit=crop",
                tag: "政治中心",
                weather: "⛅ 舒适",
                mood: "🇺🇸 庄重",
                coordinates: [38.9072, -77.0369]
            }
        ];

        const quotes = [
            "旅行的意义不在于看到多少风景，而在于成为怎样的自己",
            "世界那么大，我想去看看",
            "生活不止眼前的苟且，还有诗和远方",
            "要么读书，要么旅行，灵魂和身体总有一个在路上",
            "每一次旅行，都是一次与自己对话的机会"
        ];

        const friendsData = [];

        let map;
        let markers = [];

        function initMap() {
            map = L.map('map').setView([20, 0], 2);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                maxZoom: 18
            }).addTo(map);

            addMarkers(travelData);
        }

        function createCustomIcon(city) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="custom-marker" style="width: 36px; height: 36px;"><i class="fas fa-crosshairs"></i></div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -36]
            });
        }

        function addMarkers(data) {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            // 按照日期排序
            const sortedData = [...data].sort((a, b) => {
                const dateA = new Date(a.date.replace(/\./g, '-'));
                const dateB = new Date(b.date.replace(/\./g, '-'));
                return dateA - dateB;
            });

            // 创建时间线
            if (sortedData.length > 1) {
                const coordinates = sortedData.map(item => item.coordinates);
                const polyline = L.polyline(coordinates, {
                    color: '#FF6B6B',
                    weight: 3,
                    dashArray: '10, 10',
                    opacity: 0.7
                }).addTo(map);
                markers.push(polyline);
            }

            sortedData.forEach(item => {
                const marker = L.marker(item.coordinates, {
                    icon: createCustomIcon(item.city)
                }).addTo(map);

                marker.bindPopup(`
                    <div style="text-align: center; min-width: 150px;">
                        <h4 style="margin: 0 0 8px; color: #FF6B6B; font-family: 'Quicksand', sans-serif;">${item.city}</h4>
                        <p style="margin: 0; font-size: 13px; color: #666; font-family: 'Quicksand', sans-serif;">${item.country}</p>
                        <p style="margin: 8px 0 0; font-size: 12px; color: #999; font-family: 'Quicksand', sans-serif;">${item.date}</p>
                    </div>
                `);

                markers.push(marker);
            });
        }

        function renderCards(filterContinent = 'all') {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            let filteredData = filterContinent === 'all'
                ? travelData
                : travelData.filter(item => item.continent === filterContinent);

            // 按照日期排序
            filteredData.sort((a, b) => {
                const dateA = new Date(a.date.replace(/\./g, '-'));
                const dateB = new Date(b.date.replace(/\./g, '-'));
                return dateA - dateB;
            });

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'travel-card';
                card.innerHTML = `
                    <div class="card-image">
                        <img src="${item.image}" alt="${item.city}" loading="lazy">
                        <button class="edit-image-btn" data-id="${item.id}">
                            <i class="fas fa-camera"></i>
                        </button>
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <div class="location-info">
                                <h3 class="edit-field" data-id="${item.id}" data-field="city">${item.city}</h3>
                                <span class="country-tag">${item.country}</span>
                            </div>
                            <div class="card-actions">
                                <button class="edit-btn" data-id="${item.id}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="like-btn" data-id="${item.id}">
                                    <i class="far fa-heart"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-date">
                            <i class="far fa-calendar"></i>
                            <span class="edit-field" data-id="${item.id}" data-field="date">${item.date}</span>
                        </div>
                        <div class="card-conditions">
                            <span class="weather edit-field" data-id="${item.id}" data-field="weather">${item.weather}</span>
                            <span class="mood edit-field" data-id="${item.id}" data-field="mood">${item.mood}</span>
                        </div>
                        <p class="card-description edit-field" data-id="${item.id}" data-field="description">${item.description}</p>
                        <div class="card-footer">
                            <span class="card-tag edit-field" data-id="${item.id}" data-field="tag">${item.tag}</span>
                            <span class="card-continent">${item.continent}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('liked');
                    const icon = this.querySelector('i');
                    if (this.classList.contains('liked')) {
                        icon.className = 'fas fa-heart';
                    } else {
                        icon.className = 'far fa-heart';
                    }
                });
            });

            document.querySelectorAll('.edit-field').forEach(field => {
                field.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const field = this.dataset.field;
                    const currentValue = this.textContent;
                    
                    if (field === 'weather' || field === 'mood') {
                        const options = field === 'weather'
                            ? ['☀️ 晴朗', '⛅ 多云', '🌧️ 小雨', '🔥 炎热', '❄️ 下雪', '🍂 凉爽', '🌸 舒适']
                            : ['😊 开心', '😌 放松', '🤤 满足', '✨ 兴奋', '😍 惊叹', '🎰 刺激', '🌿 清新', '🎭 文艺', '🌶️ 火辣', '🐼 可爱', '🏞️ 震撼', '🎬 梦幻', '🇺🇸 庄重'];

                        const select = document.createElement('select');
                        options.forEach(option => {
                            const opt = document.createElement('option');
                            opt.value = option;
                            opt.textContent = option;
                            if (option === currentValue) {
                                opt.selected = true;
                            }
                            select.appendChild(opt);
                        });

                        select.className = 'edit-select';

                        const fieldElement = this;
                        const originalParent = this.parentElement;
                        originalParent.replaceChild(select, this);
                        select.focus();

                        select.addEventListener('change', function() {
                            const newValue = select.value;
                            const item = travelData.find(item => item.id === id);
                            if (item) {
                                item[field] = newValue;
                                originalParent.replaceChild(fieldElement, select);
                                fieldElement.textContent = newValue;
                                addMarkers(travelData);
                            } else {
                                originalParent.replaceChild(fieldElement, select);
                            }
                        });

                        select.addEventListener('blur', function() {
                            originalParent.replaceChild(fieldElement, select);
                        });
                    } else {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = currentValue;
                        input.className = 'edit-input';

                        const fieldElement = this;
                        const originalParent = this.parentElement;
                        originalParent.replaceChild(input, this);
                        input.focus();
                        input.select();

                        const saveAndClose = () => {
                            const newValue = input.value;
                            const item = travelData.find(item => item.id === id);
                            if (item) {
                                item[field] = newValue;
                                originalParent.replaceChild(fieldElement, input);
                                fieldElement.textContent = newValue;
                                addMarkers(travelData);
                            } else {
                                originalParent.replaceChild(fieldElement, input);
                            }
                        };

                        input.addEventListener('blur', saveAndClose);
                        input.addEventListener('keypress', function(e) {
                            if (e.key === 'Enter') {
                                input.blur();
                            }
                        });
                    }
                });
            });

            document.querySelectorAll('.edit-image-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.style.display = 'none';
                    
                    input.addEventListener('change', function(e) {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                const item = travelData.find(item => item.id === id);
                                if (item) {
                                    item.image = e.target.result;
                                    renderCards();
                                    addMarkers(travelData);
                                }
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                    
                    document.body.appendChild(input);
                    input.click();
                    document.body.removeChild(input);
                });
            });

            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const card = this.closest('.travel-card');
                    card.classList.toggle('editing');
                });
            });
        }

        function updateStats() {
            const cities = new Set(travelData.map(item => item.city));

            document.getElementById('city-count').textContent = cities.size;
            document.getElementById('trip-count').textContent = travelData.length;
            document.getElementById('friend-count').textContent = friendsData.length;
        }

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const continent = this.dataset.continent;
                    renderCards(continent);
                    if (continent === 'all') {
                        addMarkers(travelData);
                    } else {
                        const filteredData = travelData.filter(item => item.continent === continent);
                        addMarkers(filteredData);
                    }
                });
            });
        }

        function updateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('travel-quote').textContent = quotes[randomIndex];
        }

        function renderFriends() {
            const container = document.getElementById('friends-container');
            const friendsSection = document.querySelector('.friends-section');
            container.innerHTML = '';

            if (friendsData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users-slash"></i>
                        <h3>还没有朋友足迹</h3>
                        <p>点击下方按钮添加朋友</p>
                    </div>
                `;
            } else {
                friendsData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'friend-card';
                    card.innerHTML = `
                        <div class="card-image">
                            <img src="${item.avatar}" alt="${item.name}" loading="lazy">
                            <button class="edit-image-btn" data-id="${item.id}" data-type="friend">
                                <i class="fas fa-camera"></i>
                            </button>
                            <button class="delete-friend-btn" data-id="${item.id}">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="card-content">
                            <div class="card-header">
                                <div class="location-info">
                                    <h3 class="edit-field" data-id="${item.id}" data-field="name" data-type="friend">${item.name}</h3>
                                </div>
                                <div class="card-actions">
                                    <button class="edit-btn" data-id="${item.id}" data-type="friend">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="card-description edit-field" data-id="${item.id}" data-field="status" data-type="friend">${item.status}</p>
                            <div class="card-date">
                                <i class="fas fa-map-marker-alt"></i>
                                <span class="edit-field" data-id="${item.id}" data-field="location" data-type="friend">${item.location}</span>
                            </div>
                            <div class="card-footer">
                                <span class="card-tag edit-field" data-id="${item.id}" data-field="tag" data-type="friend">${item.tag || '未分类'}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            document.querySelectorAll('.delete-friend-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    friendsData = friendsData.filter(item => item.id !== id);
                    renderFriends();
                    updateStats();
                });
            });

            document.querySelectorAll('.edit-field[data-type="friend"]').forEach(field => {
                field.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const field = this.dataset.field;
                    const currentValue = this.textContent;
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = currentValue;
                    input.className = 'edit-input';
                    
                    const fieldElement = this;
                    input.addEventListener('blur', function() {
                        const newValue = this.value;
                        const item = friendsData.find(item => item.id === id);
                        if (item) {
                            item[field] = newValue;
                            fieldElement.textContent = newValue;
                            renderFriends();
                        }
                    });
                    
                    input.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            this.blur();
                        }
                    });
                    
                    const parent = this.parentElement;
                    parent.replaceChild(input, this);
                    input.select();
                });
            });

            document.querySelectorAll('.edit-image-btn[data-type="friend"]').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.style.display = 'none';
                    
                    input.addEventListener('change', function(e) {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                const item = friendsData.find(item => item.id === id);
                                if (item) {
                                    item.avatar = e.target.result;
                                    renderFriends();
                                }
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                    
                    document.body.appendChild(input);
                    input.click();
                    document.body.removeChild(input);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            renderCards();
            renderFriends();
            updateStats();
            updateQuote();

            // 添加朋友按钮
            document.getElementById('add-friend-btn').addEventListener('click', function() {
                const newFriend = {
                    id: friendsData.length + 1,
                    name: '新朋友',
                    status: '添加状态',
                    location: '添加位置',
                    avatar: 'https://via.placeholder.com/100',
                    tag: '未分类'
                };
                friendsData.push(newFriend);
                renderFriends();
                updateStats();
            });

            // 添加城市按钮
            if (document.getElementById('add-city-btn')) {
                document.getElementById('add-city-btn').addEventListener('click', function() {
                    const newCity = {
                        id: travelData.length + 1,
                        city: '新城市',
                        country: '中国',
                        continent: '亚洲',
                        date: '2026.04',
                        description: '添加描述',
                        image: 'https://via.placeholder.com/600x400',
                        tag: '未分类',
                        weather: '☀️ 晴朗',
                        mood: '😊 开心',
                        coordinates: [30.0, 120.0]
                    };
                    travelData.push(newCity);
                    renderCards();
                    addMarkers(travelData);
                    updateStats();
                });
            }
        });
    </script>
